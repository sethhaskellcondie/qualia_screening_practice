<div>
  <span>Filter by tag:</span>
  @for (tag of availableTags; track tag) {
    <button (click)="onTagToggle(tag)">
      {{ tag }} {{ isSelected(tag) ? '✓' : '' }}
    </button>
  }
  @if (selectedTags.length > 0) {
    |
    <button (click)="selectedTags = []; filterChanged.emit([])">Clear</button>
  }
</div>
