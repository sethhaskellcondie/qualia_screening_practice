<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div>
    <label for="description">Description</label>
    <input id="description" type="text" formControlName="description" />
    @if (isInvalid('description')) {
      <span>description is required.</span>
    }
  </div>

  <div>
    <label for="amount">Amount</label>
    <input id="amount" type="number" formControlName="amount" min="0.01" step="0.01" />
    @if (isInvalid('amount')) {
      <span>A positive amount is required.</span>
    }
  </div>

  <div>
    <label>Category</label>
    @for (cat of categories; track cat) {
      <div>
        <input type="radio" [id]="cat" [value]="cat" formControlName="category" />
        <label [for]="cat">{{ cat }}</label>
      </div>
    }
    @if (isInvalid('category')) {
      <span>Please select a category.</span>
    }
  </div>

  <div>
    <label for="date">Date</label>
    <input id="date" type="date" formControlName="date" />
    @if (isInvalid('date')) {
      <span>Date is required.</span>
    }
  </div>

  <button type="submit">Add Expense</button>
</form>
